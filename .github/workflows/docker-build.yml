name: Build ColorTxt ARM64 Docker Image

on:
  push:
    paths:
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

# 统一配置，只改这里
env:
  IMAGE_NAME: colortxt
  IMAGE_TAG: 2.2.0-arm64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ 修复版构建（无跨平台错误）
      - name: Build ARM64 Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          outputs: type=docker,dest=/tmp/${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # 关键修复：增加构建权限和依赖
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}-image
          path: /tmp/${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar
          retention-days: 30
